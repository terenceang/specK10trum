<!doctype html>

          </div>
          <div class="zx-buf-list" id="zx-buf-list"></div>
          <div class="zx-tx" id="zx-tx">TX: 0</div>
          <div class="zx-dot" id="zx-dot" title="Disconnected"></div>
          <button id="zx-btn-conn" style="background:rgba(255,255,255,0.03);border:1px solid #333;color:#666;padding:3px 8px;font-family:inherit;font-size:9px;cursor:pointer;border-radius:3px">CONNECT</button>
          <button id="zx-btn-fs" style="background:rgba(255,255,255,0.03);border:1px solid #333;color:#666;padding:3px 8px;font-family:inherit;font-size:9px;cursor:pointer;border-radius:3px">⛶</button>
        </div>

        <!-- Menu System -->
        <div class="zx-menu" id="zx-menu">
          <div class="zx-menu-item" data-action="model">Model</div>
          <div class="zx-menu-item" data-action="layout">Keyboard Layout</div>
          <div class="zx-menu-item" data-action="tape_player">Tape Player</div>
          <div class="zx-menu-item" data-action="snapshot">Load Snapshot</div>
          <div class="zx-menu-item" data-action="joystick">Joystick</div>
          <div class="zx-menu-sep"></div>
          <div class="zx-menu-item danger" data-action="reset">Reset</div>
        </div>

        <!-- Submenu for File Picker -->
        <div class="zx-submenu" id="zx-submenu">
          <div class="zx-submenu-hdr">
            <span class="zx-submenu-title" id="zx-submenu-title">FILES</span>
            <span class="zx-submenu-close" id="zx-submenu-close">&times;</span>
          </div>
          <div style="padding:10px 16px; border-bottom:1px solid #333">
            <input type="text" id="zx-file-filter" placeholder="Filter files..." 
                   style="width:100%; background:#0c0c0d; border:1px solid #444; color:#fff; padding:6px 10px; font-size:11px; border-radius:4px; outline:none">
          </div>
          <div class="zx-submenu-list" id="zx-submenu-list"></div>
        </div>

        <!-- Layout Selection Modal -->
        <div class="zx-modal" id="zx-layout-modal" style="display:none">
          <div class="zx-modal-content">
            <div class="zx-modal-header">
              <span class="zx-modal-title">Select Layout</span>
              <span class="zx-modal-close" id="zx-layout-close">&times;</span>
            </div>
            <div class="zx-modal-body">
              <div class="zx-model-option" data-layout="48k">
                <input type="radio" name="layout" value="48k" id="layout-48k" checked>
                <label for="layout-48k">Classic 48K</label>
              </div>
              <div class="zx-model-option" data-layout="plus">
                <input type="radio" name="layout" value="plus" id="layout-plus">
                <label for="layout-plus">Spectrum Plus</label>
              </div>
            </div>
            <div class="zx-modal-footer">
              <button class="zx-modal-btn" id="zx-layout-confirm">Apply</button>
            </div>
          </div>
        </div>

        <!-- Model Selection Modal -->
        <div class="zx-modal" id="zx-model-modal" style="display:none">
          <div class="zx-modal-content">
            <div class="zx-modal-header">
              <span class="zx-modal-title">Select Model</span>
              <span class="zx-modal-close" id="zx-model-close">&times;</span>
            </div>
            <div class="zx-modal-body">
              <div class="zx-model-option" data-model="48k">
                <input type="radio" name="model" value="48k" id="model-48k">
                <label for="model-48k">ZX Spectrum 48K</label>
              </div>
              <div class="zx-model-option" data-model="128k">
                <input type="radio" name="model" value="128k" id="model-128k">
                <label for="model-128k">ZX Spectrum 128K</label>
              </div>
            </div>
            <div class="zx-modal-footer">
              <button class="zx-modal-btn" id="zx-model-confirm">Select</button>
            </div>
          </div>
        </div>

        <!-- Tape Player UI -->
        <div class="zx-player" id="zx-player">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div class="zx-player-label" id="zx-player-label" style="font-weight:bold; color:var(--ink)">NO TAPE LOADED</div>
            <div style="display:flex; gap:8px; align-items:center">
              <button id="zx-player-refresh" class="zx-player-refresh" title="Refresh tapes">⟳</button>
              <span id="zx-player-close" style="cursor:pointer; color:var(--dim); font-size:16px">&times;</span>
            </div>
          </div>
          <div class="zx-player-counter" id="zx-player-counter">Block 0 / 0</div>

          <div style="display:flex; gap:6px;">
            <button class="zx-player-btn" id="zx-btn-load-tape" style="flex:2">LOAD TAPE</button>
            <button class="zx-player-btn" id="zx-btn-instaload" style="flex:1">RUN NOW</button>
          </div>

          <div style="display:flex; align-items:center; justify-content:space-between; padding:4px 0 2px 0;">
            <span style="font-size:10px; font-weight:bold; color:var(--dim);">MODE</span>
          </div>

          <div class="zx-player-controls" id="zx-tape-mode-selector">
            <div class="zx-player-btn" data-tape-mode="manual">MANUAL</div>
            <div class="zx-player-btn" data-tape-mode="auto">AUTO</div>
            <div class="zx-player-btn" data-tape-mode="instant">INSTANT</div>
          </div>

          <div id="zx-cassette-deck">
            <div class="zx-player-deck">
              <div class="zx-player-cassette">
                <div class="zx-player-reel" id="zx-reel-left"></div>
                <div class="zx-player-reel" id="zx-reel-right"></div>
              </div>
            </div>
          </div>

          <div class="zx-player-controls">
            <div class="zx-player-btn" data-tape="tape_play">PLAY</div>
            <div class="zx-player-btn" data-tape="tape_stop">STOP</div>
            <div class="zx-player-btn" data-tape="tape_rewind">REW</div>
            <div class="zx-player-btn" data-tape="tape_ffwd">FFWD</div>
            <div class="zx-player-btn" data-tape="tape_eject">EJECT</div>
          </div>

          <div style="display:flex; align-items:center; justify-content:space-between; padding:4px 0;">
            <span style="font-size:10px; font-weight:bold; color:var(--dim);">TAPE MONITOR</span>
            <label class="zx-switch">
              <input type="checkbox" id="zx-tape-monitor-toggle">
              <span class="zx-slider"></span>
            </label>
          </div>

          <div class="zx-player-files" id="zx-player-files" style="display:none">
            <div style="padding:8px 10px;color:var(--dim);font-size:11px">No tapes</div>
          </div>
        </div>

        <!-- Keyboard -->
        <div class="zx-kb" id="zx-kb">
          <!-- Populated by keyboard.js -->
        </div>
        <!-- Gamepad (Kempston joystick) -->
        <div class="zx-gamepad" id="zx-gamepad"></div>
      </div>
    </div>

    <div class="zx-footer">Binary [row,bit,pressed] → /ws · CAPS/SYM are toggles</div>
  </div>
</div>

<script src="/layout-48k.js?v=0.2.3"></script>
<script src="/layout-plus.js?v=0.2.3"></script>
<script src="/zx-layout.js?v=0.2.3"></script>
<script src="/utils.js?v=0.2.3"></script>
<script src="/ws.js?v=0.2.3"></script>
<script src="/keyboard.js?v=0.2.3"></script>
<script src="/joystick.js?v=0.2.3"></script>
<script src="/menu.js?v=0.2.3"></script>
<script src="/tape-player.js?v=0.2.3"></script>
<script src="/zx-app.js?v=0.2.3"></script>
</body>
</html>
