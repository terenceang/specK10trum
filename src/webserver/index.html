<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speck10trum Virtual Keyboard</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #eee; text-align: center; }
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; max-width: 600px; margin: 20px auto; padding: 10px; background: #444; border-radius: 10px; }
        .key { padding: 15px 5px; background: #666; border-radius: 5px; cursor: pointer; user-select: none; font-weight: bold; }
        .key:active { background: #999; }
        .key.pressed { background: #aaa; color: #000; }
        .status { margin-top: 10px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>
    <h2>speck10trum Keyboard</h2>
    <div id="status" class="status">Connecting...</div>
    <div class="keyboard" id="kb"></div>

        <script>
        // SSOT: Keyboard layout definition
                // ZX Spectrum 48K keyboard matrix (row, bit):
                // Row 0: SHIFT Z X C V
                // Row 1: A S D F G
                // Row 2: Q W E R T
                // Row 3: 1 2 3 4 5
                // Row 4: 0 9 8 7 6
                // Row 5: P O I U Y
                // Row 6: ENTER L K J H
                // Row 7: SPACE SYM M N B
                const keyboardLayout = [
                    [ // Row 0
                        { label: 'SHIFT', row: 0, bit: 0 },
                        { label: 'Z', row: 0, bit: 1 },
                        { label: 'X', row: 0, bit: 2 },
                        { label: 'C', row: 0, bit: 3 },
                        { label: 'V', row: 0, bit: 4 }
                    ],
                    [ // Row 1
                        { label: 'A', row: 1, bit: 0 },
                        { label: 'S', row: 1, bit: 1 },
                        { label: 'D', row: 1, bit: 2 },
                        { label: 'F', row: 1, bit: 3 },
                        { label: 'G', row: 1, bit: 4 }
                    ],
                    [ // Row 2
                        { label: 'Q', row: 2, bit: 0 },
                        { label: 'W', row: 2, bit: 1 },
                        { label: 'E', row: 2, bit: 2 },
                        { label: 'R', row: 2, bit: 3 },
                        { label: 'T', row: 2, bit: 4 }
                    ],
                    [ // Row 3
                        { label: '1', row: 3, bit: 0 },
                        { label: '2', row: 3, bit: 1 },
                        { label: '3', row: 3, bit: 2 },
                        { label: '4', row: 3, bit: 3 },
                        { label: '5', row: 3, bit: 4 }
                    ],
                    [ // Row 4
                        { label: '0', row: 4, bit: 0 },
                        { label: '9', row: 4, bit: 1 },
                        { label: '8', row: 4, bit: 2 },
                        { label: '7', row: 4, bit: 3 },
                        { label: '6', row: 4, bit: 4 }
                    ],
                    [ // Row 5
                        { label: 'P', row: 5, bit: 0 },
                        { label: 'O', row: 5, bit: 1 },
                        { label: 'I', row: 5, bit: 2 },
                        { label: 'U', row: 5, bit: 3 },
                        { label: 'Y', row: 5, bit: 4 }
                    ],
                    [ // Row 6
                        { label: 'ENTER', row: 6, bit: 0 },
                        { label: 'L', row: 6, bit: 1 },
                        { label: 'K', row: 6, bit: 2 },
                        { label: 'J', row: 6, bit: 3 },
                        { label: 'H', row: 6, bit: 4 }
                    ],
                    [ // Row 7
                        { label: 'SPACE', row: 7, bit: 0 },
                        { label: 'SYM', row: 7, bit: 1 },
                        { label: 'M', row: 7, bit: 2 },
                        { label: 'N', row: 7, bit: 3 },
                        { label: 'B', row: 7, bit: 4 }
                    ]
                ];

        const status = document.getElementById('status');
        const kb = document.getElementById('kb');
        const ws = new WebSocket('ws://' + location.host + '/ws');

        ws.onopen = () => status.innerText = 'Connected';
        ws.onclose = () => status.innerText = 'Disconnected';

        function sendKey(row, bit, isPressed) {
            if (ws.readyState === WebSocket.OPEN) {
                const data = new Uint8Array([row, bit, isPressed ? 1 : 0]);
                ws.send(data);
            }
        }

        // Generate keyboard dynamically from SSOT
        kb.innerHTML = '';
        keyboardLayout.forEach(rowArr => {
            rowArr.forEach(key => {
                const el = document.createElement('div');
                el.className = 'key';
                el.setAttribute('data-row', key.row);
                el.setAttribute('data-bit', key.bit);
                el.setAttribute('tabindex', 0);
                el.innerText = key.label;
                // Mouse/touch events
                const handlePress = (e) => {
                    e.preventDefault();
                    el.classList.add('pressed');
                    sendKey(key.row, key.bit, true);
                };
                const handleRelease = (e) => {
                    e.preventDefault();
                    el.classList.remove('pressed');
                    sendKey(key.row, key.bit, false);
                };
                el.addEventListener('mousedown', handlePress);
                el.addEventListener('mouseup', handleRelease);
                el.addEventListener('mouseleave', handleRelease);
                el.addEventListener('touchstart', handlePress);
                el.addEventListener('touchend', handleRelease);
                // Keyboard accessibility
                el.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' || e.code === 'Enter') {
                        handlePress(e);
                    }
                });
                el.addEventListener('keyup', (e) => {
                    if (e.code === 'Space' || e.code === 'Enter') {
                        handleRelease(e);
                    }
                });
                kb.appendChild(el);
            });
        });
        </script>
        <script src="/tape-player.js"></script>
        <script src="/menu.js"></script>
        <script src="/keyboard.js"></script>
</body>
</html>
